apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "schizm.apiName" . }}
  labels:
    {{- include "schizm.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "schizm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "schizm.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      annotations:
        {{- toYaml .Values.api.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "schizm.apiDispatcherServiceAccountName" . }}
      automountServiceAccountToken: true
      {{- if .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range .Values.image.pullSecrets }}
        - name: {{ . | quote }}
        {{- end }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "schizm.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- toYaml .Values.api.args | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "schizm.apiConfigMapName" . }}
            {{- if or .Values.api.existingSecret (gt (len (default (dict) .Values.api.secret)) 0) }}
            - secretRef:
                name: {{ include "schizm.apiSecretName" . }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 8
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      nodeSelector:
        {{- toYaml .Values.api.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.api.tolerations | nindent 8 }}
      affinity:
        {{- toYaml .Values.api.affinity | nindent 8 }}
