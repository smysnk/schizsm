name: Main Release Pipeline

on:
  workflow_dispatch:
    inputs:
      deploy_fleet:
        description: "Deploy the Fleet bundle after the image build"
        required: false
        default: true
        type: boolean

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  docker-image:
    uses: ./.github/workflows/image-build.yml
    with:
      image_tag: main
      push_image: true
    secrets: inherit

  fleet-deploy:
    needs: docker-image
    if: ${{ github.event_name == 'push' || inputs.deploy_fleet }}
    runs-on: ${{ fromJSON(vars.FLEET_DEPLOY_RUNNER_JSON != '' && vars.FLEET_DEPLOY_RUNNER_JSON || '"ubuntu-latest"') }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Write Fleet kubeconfig
        shell: bash
        env:
          FLEET_KUBECONFIG: ${{ secrets.FLEET_KUBECONFIG }}
          FLEET_KUBE_API_SERVER: ${{ vars.FLEET_KUBE_API_SERVER || 'https://kube.smysnk.com' }}
        run: |
          test -n "$FLEET_KUBECONFIG" || { echo "Missing FLEET_KUBECONFIG secret"; exit 1; }
          kubeconfig_path="${RUNNER_TEMP}/fleet-kubeconfig"
          printf '%s' "$FLEET_KUBECONFIG" > "$kubeconfig_path"
          if [ -n "${FLEET_KUBE_API_SERVER:-}" ]; then
            python3 -c 'import pathlib, re, sys; kubeconfig_path = pathlib.Path(sys.argv[1]); server = sys.argv[2]; contents = kubeconfig_path.read_text(encoding="utf-8"); updated = re.sub(r"^(\s*server:\s*).*$", rf"\1{server}", contents, count=1, flags=re.MULTILINE); updated = re.sub(r"^\s*certificate-authority-data:\s*.*\n?", "", updated, flags=re.MULTILINE); updated = re.sub(r"^\s*certificate-authority:\s*.*\n?", "", updated, flags=re.MULTILINE); (_ for _ in ()).throw(SystemExit("Failed to locate server entry in generated kubeconfig")) if updated == contents else kubeconfig_path.write_text(updated, encoding="utf-8")' "$kubeconfig_path" "$FLEET_KUBE_API_SERVER"
          fi
          chmod 600 "$kubeconfig_path"
          echo "KUBECONFIG_PATH=$kubeconfig_path" >> "$GITHUB_ENV"

      - name: Deploy Fleet bundle and restart workloads
        run: ./scripts/deploy-fleet.sh --kubeconfig "$KUBECONFIG_PATH" --restart
