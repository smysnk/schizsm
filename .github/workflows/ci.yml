name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Capture build start time
        run: echo "TEST_STATION_BUILD_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.13.0 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install demo renderer Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/demo/requirements.txt

      - name: Install Playwright browser
        run: yarn exec playwright install --with-deps chromium

      - name: Run test-station report
        id: test_report
        shell: bash
        run: |
          log_path="${RUNNER_TEMP}/schizm-test-report.log"
          set +e
          yarn test 2>&1 | tee "$log_path"
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          echo "log_path=$log_path" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload test-station report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schizm-test-report
          path: ./.test-results/schizm-test-report
          if-no-files-found: warn

      - name: Derive test report status
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.test_report.outputs.exit_code }}" = "0" ]; then
            echo "TEST_STATION_CI_STATUS=passed" >> "$GITHUB_ENV"
          else
            echo "TEST_STATION_CI_STATUS=failed" >> "$GITHUB_ENV"
          fi

      - name: Configure AWS credentials for report archive sync
        if: ${{ always() && vars.S3_BUCKET != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.S3_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.S3_AWS_REGION != '' && vars.S3_AWS_REGION || 'us-east-1' }}

      - name: Sync test report to S3
        if: ${{ always() && vars.S3_BUCKET != '' }}
        shell: bash
        env:
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          S3_STORAGE_PREFIX: ${{ vars.S3_STORAGE_PREFIX }}
        run: |
          storage_prefix="${S3_STORAGE_PREFIX:-ci/${GITHUB_REPOSITORY}/${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}}"
          echo "S3_STORAGE_PREFIX=$storage_prefix" >> "$GITHUB_ENV"
          if [ -d ./.test-results/schizm-test-report ]; then
            aws s3 sync ./.test-results/schizm-test-report "s3://${S3_BUCKET}/${storage_prefix}" --no-progress
          else
            echo "Skipping S3 sync because the test report directory does not exist."
          fi

      - name: Publish test report to test-station ingest endpoint
        if: always()
        shell: bash
        env:
          TEST_STATION_INGEST_ENDPOINT: ${{ vars.TEST_STATION_INGEST_ENDPOINT != '' && vars.TEST_STATION_INGEST_ENDPOINT || 'https://test-station.smysnk.com/api/ingest' }}
          TEST_STATION_INGEST_PROJECT_KEY: ${{ vars.TEST_STATION_INGEST_PROJECT_KEY != '' && vars.TEST_STATION_INGEST_PROJECT_KEY || 'schizm' }}
          TEST_STATION_INGEST_SHARED_KEY: ${{ secrets.TEST_STATION_INGEST_SHARED_KEY }}
          S3_PUBLIC_URL: ${{ vars.S3_PUBLIC_URL }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
        run: |
          if [ -z "$TEST_STATION_INGEST_SHARED_KEY" ]; then
            echo "Skipping ingest publish because TEST_STATION_INGEST_SHARED_KEY is not set."
            exit 0
          fi
          if [ ! -f ./.test-results/schizm-test-report/report.json ]; then
            echo "Skipping ingest publish because report.json was not generated."
            exit 0
          fi
          export TEST_STATION_BUILD_COMPLETED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export S3_STORAGE_PREFIX="${S3_STORAGE_PREFIX:-ci/${GITHUB_REPOSITORY}/${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}}"
          node ./scripts/publish-ingest-report.mjs --input ./.test-results/schizm-test-report/report.json

      - name: Assert test success
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.test_report.outputs.exit_code }}" = "0" ]; then
            exit 0
          fi
          echo "Test-station run failed. Captured log:"
          if [ -f "${{ steps.test_report.outputs.log_path }}" ]; then
            cat "${{ steps.test_report.outputs.log_path }}"
          else
            echo "No log file found at ${{ steps.test_report.outputs.log_path }}"
          fi
          exit 1

  docker-image:
    needs: test
    if: ${{ needs.test.result == 'success' && github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
    uses: ./.github/workflows/image-build.yml
    with:
      image_tag: main
      push_image: true
    secrets: inherit

  fleet-deploy:
    needs: docker-image
    if: ${{ needs.docker-image.result == 'success' }}
    runs-on: ${{ fromJSON(vars.FLEET_DEPLOY_RUNNER_JSON != '' && vars.FLEET_DEPLOY_RUNNER_JSON || '"ubuntu-latest"') }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Write Fleet kubeconfig
        shell: bash
        env:
          FLEET_KUBECONFIG: ${{ secrets.FLEET_KUBECONFIG }}
          FLEET_KUBE_API_SERVER: ${{ vars.FLEET_KUBE_API_SERVER || 'https://kube.smysnk.com' }}
        run: |
          test -n "$FLEET_KUBECONFIG" || { echo "Missing FLEET_KUBECONFIG secret"; exit 1; }
          kubeconfig_path="${RUNNER_TEMP}/fleet-kubeconfig"
          printf '%s' "$FLEET_KUBECONFIG" > "$kubeconfig_path"
          if [ -n "${FLEET_KUBE_API_SERVER:-}" ]; then
            python3 -c 'import pathlib, re, sys; kubeconfig_path = pathlib.Path(sys.argv[1]); server = sys.argv[2]; contents = kubeconfig_path.read_text(encoding="utf-8"); pattern = re.compile(r"^(\s*server:\s*).*$", flags=re.MULTILINE); (_ for _ in ()).throw(SystemExit("Failed to locate server entry in generated kubeconfig")) if not pattern.search(contents) else None; updated = pattern.sub(rf"\1{server}", contents, count=1); updated = re.sub(r"^\s*certificate-authority-data:\s*.*\n?", "", updated, flags=re.MULTILINE); updated = re.sub(r"^\s*certificate-authority:\s*.*\n?", "", updated, flags=re.MULTILINE); kubeconfig_path.write_text(updated, encoding="utf-8")' "$kubeconfig_path" "$FLEET_KUBE_API_SERVER"
          fi
          chmod 600 "$kubeconfig_path"
          echo "KUBECONFIG_PATH=$kubeconfig_path" >> "$GITHUB_ENV"

      - name: Deploy Fleet bundle and restart workloads
        run: ./scripts/deploy-fleet.sh --kubeconfig "$KUBECONFIG_PATH" --restart
